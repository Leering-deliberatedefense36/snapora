version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Group safe patch + minor updates so we don't drown in PRs
      minor-and-patch:
        update-types: [minor, patch]
        # Keep these on their own — major bumps for build-critical deps need eyes
        exclude-patterns:
          - electron
          - electron-builder
          - electron-vite
          - vite
          - typescript
          - react
          - react-dom
    labels: [dependencies]
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
