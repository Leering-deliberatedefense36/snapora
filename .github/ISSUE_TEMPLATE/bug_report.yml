name: Bug report
description: Report something that's broken in Snapora.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you give, the faster we can fix it.
        **Don't include security issues here** — see [SECURITY.md](../../blob/main/SECURITY.md).
  - type: input
    id: version
    attributes:
      label: Snapora version
      description: From the tray menu, or `package.json`.
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.5 (Sonoma) — Apple silicon
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Screenshots / screen recordings help.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Snapora
        2. Press Cmd+Shift+2
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Snapora writes logs to `~/Library/Logs/snapora/main.log`. Paste relevant excerpts.
      render: shell
