appId: com.forgemoss.snapora
productName: Snapora
copyright: Copyright © 2026 forgemoss

directories:
  buildResources: build
  output: release/${version}

files:
  - out/**/*
  - resources/*.png
  - package.json
  - '!**/{.DS_Store,.git,.gitkeep,.vscode,.idea}'
  - '!**/{*.map,*.md,*.tsbuildinfo}'
  - '!**/{tsconfig*.json,tsconfig*.json,vite.config.*,vitest.config.*,playwright.config.*}'
  - '!**/{.eslintrc*,.prettierrc*,eslint.config.*}'

extraResources:
  - from: resources/bin
    to: bin
    filter: ['**/*']

asar: true
asarUnpack:
  - resources/bin/**/*

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false # set to true once Apple Developer creds are wired in CI
  extendInfo:
    NSCameraUsageDescription: Snapora needs camera access for webcam overlays during screen recording.
    NSMicrophoneUsageDescription: Snapora needs microphone access to record audio with your screen recordings.
    NSScreenCaptureUsageDescription: Snapora needs screen recording access to take screenshots and record your screen.
    LSUIElement: true # menu-bar-only app (no Dock icon)

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: forgemoss
  repo: Snapora
  releaseType: release
