appId: com.forgemoss.snapora
productName: Snapora
copyright: Copyright © 2026 forgemoss

directories:
  buildResources: build
  output: release/${version}

files:
  - out/**/*
  - resources/*.png
  - package.json
  - '!**/{.DS_Store,.git,.gitkeep,.vscode,.idea}'
  - '!**/{*.map,*.md,*.tsbuildinfo}'
  - '!**/{tsconfig*.json,vite.config.*,vitest.config.*,playwright.config.*}'
  - '!**/{.eslintrc*,.prettierrc*,eslint.config.*}'

# extraResources for bundled binaries (ffmpeg, tesseract, etc.) is wired up
# from v0.4 onward — the resources/bin folder doesn't exist yet, and
# pointing at a missing source breaks `electron-builder` packaging. Re-add
# this block once those binaries land in resources/bin.
asar: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: build/icon.icns
  # Skip code signing entirely until the Apple Developer Program is wired in.
  # `identity: null` tells electron-builder to not even try — without this and
  # without CSC_LINK, the signer falls through to a cwd path lookup and errors
  # with "<project root> not a file".
  identity: null
  # hardenedRuntime requires signing; off until we have a Developer ID.
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false # set to true once Apple Developer creds are wired in CI
  extendInfo:
    NSCameraUsageDescription: Snapora needs camera access for webcam overlays during screen recording.
    NSMicrophoneUsageDescription: Snapora needs microphone access to record audio with your screen recordings.
    NSScreenCaptureUsageDescription: Snapora needs screen recording access to take screenshots and record your screen.
    LSUIElement: true # menu-bar-only app (no Dock icon)

# DMG layout — let electron-builder use defaults (.app left, /Applications right).
# Custom contents arrays without explicit path: caused "not a file" packaging
# errors; revisit once we have a custom DMG background.
dmg:
  sign: false

publish:
  provider: github
  owner: forgemoss
  repo: Snapora
  releaseType: release
